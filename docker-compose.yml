services:
  postgres:
    image: postgres:16

    container_name: filaro-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: filaro
      POSTGRES_USER: filaro
      POSTGRES_PASSWORD: filaro

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: