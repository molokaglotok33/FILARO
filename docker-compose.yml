services:

  postgres:
    image: postgres:16

    container_name: filaro-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: filaro-backend

    restart: unless-stopped

    depends_on:
      - postgres

    env_file:
      - .env

    environment:
      DATABASE_URL: ${DATABASE_URL}

    ports:
      - "8000:8000"

    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

volumes:
  postgres_data: