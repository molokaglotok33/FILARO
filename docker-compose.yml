services:

  postgres:
    image: postgres:16

    container_name: filaro-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: filaro
      POSTGRES_USER: filaro
      POSTGRES_PASSWORD: filaro

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build:
      context: ./backend

    container_name: filaro-backend

    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "8000:8000"

volumes:
  postgres_data: